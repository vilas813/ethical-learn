<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Ethical Learn</title>
    <style>
      :root {
        --bg: #0b1220;
        --surface: #121c2a;
        --text: #e8f0ff;
        --muted: #a3b1c2;
        --accent: #4fb6ff;
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1b2c4a 0%, #05080f 55%, #03040a 100%);
        color: var(--text);
        display: grid;
        place-items: center;
      }

      .card {
        width: min(420px, 90vw);
        padding: 2.25rem 2rem;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.85rem;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0 0 1.75rem;
        color: var(--muted);
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.35rem;
      }

      input {
        width: 100%;
        padding: 0.85rem 1rem;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(18, 28, 42, 0.9);
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }

      input:focus {
        border-color: rgba(79, 182, 255, 0.7);
        box-shadow: 0 0 0 4px rgba(79, 182, 255, 0.14);
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-top: 1.75rem;
      }

      .button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        padding: 0.95rem 1.25rem;
        border-radius: 999px;
        border: 2px solid transparent;
        background: linear-gradient(135deg, rgba(79, 182, 255, 0.32), rgba(44, 134, 255, 0.16));
        color: var(--text);
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        transition: transform 120ms ease, filter 120ms ease;
      }

      .button:hover {
        transform: translateY(-1px);
        filter: saturate(1.2);
      }

      .secondary {
        font-weight: 600;
        text-align: center;
        color: var(--muted);
        text-decoration: none;
      }

      .secondary:hover {
        color: var(--accent);
      }

      .legal {
        margin-top: 1.5rem;
        font-size: 0.85rem;
        color: rgba(163, 177, 194, 0.75);
        line-height: 1.5;
      }

      .legal a {
        color: rgba(163, 177, 194, 0.9);
        text-decoration: none;
      }

      .legal a:hover {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Welcome back</h1>
      <p>Log in to continue learning with Ethical Learn.</p>

      <form>
        <div>
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="you@example.com" required />
        </div>

        <div style="margin-top: 1.25rem;">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="••••••••" required />
        </div>

        <div class="actions">
          <button class="button" type="submit">Sign in</button>
          <a class="secondary" href="signup.html">Create an account</a>
        </div>
      </form>

      <p class="legal">
        By signing in, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
      </p>

      <p class="secondary" style="margin-top: 1rem; text-align: center;">
        <a href="index.html">Back to home</a>
      </p>
    </div>
  </body>
</html>
